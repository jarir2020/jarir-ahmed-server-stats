name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sqlite:
    name: PHP ${{ matrix.php }} (SQLite)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, json
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress

      - name: Run tests
        run: composer test

  mysql:
    name: PHP 8.3 (MySQL)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: server_stats_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      SERVER_STATS_TEST_MYSQL: '1'
      SERVER_STATS_HOST: 127.0.0.1
      SERVER_STATS_PORT: '3306'
      SERVER_STATS_USERNAME: root
      SERVER_STATS_PASSWORD: ''
      SERVER_STATS_DATABASE: server_stats_test
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql, pdo_sqlite, json
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -uroot --silent; then break; fi
            sleep 2
          done

      - name: Run tests
        run: composer test
